[build]
  publish = "."
  command = "node scripts/inject-env.mjs"

[build.environment]
  NODE_VERSION = "20"

# Pretty URLs for folder-based routes already work due to index.html files.
# Redirect only the root form submission path if needed by Netlify fallback.
[[redirects]]
  from = "/kontakt/danke"
  to = "/kontakt/danke/"
  status = 301
